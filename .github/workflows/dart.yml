name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0" # sesuaikan dengan project kamu

      - name: Install dependencies
        run: flutter pub get

      - name: Auto fix issues
        run: |
          dart fix --apply
          dart format .

      - name: Analyze project source
        run: flutter analyze || true  # jangan gagal kalau masih ada warning

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
